# config/config.example.conf
#
# Copy this file somewhere outside the repo (e.g. your app's own private
# config directory) as config.conf, fill in your own values, and pass its
# path as the first argument to bin/backup_staging.sh and bin/run_backup.sh.
#
# This file is plain bash, sourced directly by both scripts - no exotic
# syntax, but that also means it runs as bash, so keep it to simple
# variable assignments (as below) and don't put untrusted content in it.
#
# Never commit a filled-in copy of this file (paths/remote names/hostnames
# are meant to stay private-ish, and if you ever end up putting a password
# directly in here instead of using RESTIC_PASSWORD_COMMAND, that
# absolutely must never be committed anywhere).

# --- What to stage -----------------------------------------------------

# Root of the data you want backed up (your app's workspace root, home
# directory, whatever makes sense for your account).
SOURCE_ROOT="/path/to/your/workspace"

# Directories, relative to SOURCE_ROOT, to stage. Every *.db (sqlite) file
# found under these is exported with `sqlite3 <db> ".backup <dest>"`
# instead of copied, so a live WAL-mode database is never corrupted by a
# plain copy. Everything else is copied with rsync.
STAGING_DIRS=(data memory docs config scripts)

# Optional: directories OUTSIDE SOURCE_ROOT to stage verbatim, as
# "label:path" entries - e.g. a secrets vault, or a bare git repo whose own
# history you want preserved (unlike STAGING_DIRS content, .git under an
# EXTRA_DIRS path is NOT excluded by default - add a pattern to
# EXTRA_RSYNC_EXCLUDES below if you want it stripped for a given entry).
EXTRA_DIRS=("vault:/path/to/your/secrets-vault")

# Optional: extra rsync --exclude patterns, on top of the built-in defaults
# (__pycache__/, *.pyc, node_modules/, .git/, */cache/, */caches/,
# *trajectory*, and the *.db* family, which are handled separately by the
# sqlite3 export step above).
EXTRA_RSYNC_EXCLUDES=()

# Where the staging tree is (re)built. Wiped and rebuilt on every run - use
# a directory that is NOT itself inside a git-tracked tree.
STAGING_DIR="/path/to/your/backup-staging"

# --- Where it goes -------------------------------------------------------

# rclone remote name (must already exist: check with `rclone listremotes`).
# Each consuming account should use its own remote/OAuth - no shared
# credentials across accounts.
RCLONE_REMOTE_NAME="myremote"

# restic repository path, using the rclone: backend prefix that tells
# restic to talk to the rclone remote above.
RESTIC_REPO="rclone:myremote:my-backups/repo"

# Command that PRINTS the restic repository password to stdout when run.
# Passed to restic as RESTIC_PASSWORD_COMMAND - restic invokes it itself as
# a subprocess, so the password is never in this file, an env var dump, or
# a transcript. Point this at your own secret manager / vault script.
RESTIC_PASSWORD_COMMAND="/path/to/your/secret-retrieval-script restic-repo-password"

# Tag applied to each restic snapshot this tool creates.
RESTIC_TAG="backup"

# --- Retention -------------------------------------------------------------

RETENTION_HOURLY=24
RETENTION_DAILY=14
RETENTION_WEEKLY=8
RETENTION_MONTHLY=6

# Day of week (date -u +%u: 1=Monday .. 7=Sunday) on which `restic forget`
# also runs --prune (the expensive repack step that reclaims space). Forget
# itself (cheap - just unreferences snapshots) runs every invocation
# regardless. Leave blank ("") to never auto-prune.
PRUNE_DAY=7

# --- Failure notification ---------------------------------------------------

# Pluggable failure notifier. On any failure, run_backup.sh invokes:
#   "$NOTIFY_CMD" "<title>" "<body>" "<priority>"
# where priority is currently always "high". The command must exit 0 on
# success; a non-zero exit or a missing NOTIFY_CMD is logged as a warning
# but never blocks or masks the underlying backup failure.
#
# Leave blank for a no-op (failures are still logged to stdout/stderr,
# just not pushed anywhere else). Point it at your own notifier script -
# Slack webhook, email, PagerDuty, whatever your account already uses.
NOTIFY_CMD=""
